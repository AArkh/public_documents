<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact 10DAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col antialiased selection:bg-indigo-100 selection:text-indigo-900 overflow-x-hidden text-neutral-900 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-50/80 via-white to-slate-50 relative"
  >
    <header
      class="flex sm:py-16 w-full pt-10 pr-6 pb-10 pl-6 justify-between items-center max-w-5xl mx-auto"
    >
      <a href="/" class="flex items-center text-lg font-semibold">
        10DAN
      </a>
      <nav class="flex gap-6 text-sm font-medium text-neutral-600">
        <a href="/about.html" class="hover:text-neutral-900">About</a>
        <a href="/contact.html" class="text-neutral-900">Contact</a>
      </nav>
    </header>

    <main
      class="flex-1 flex flex-col sm:px-8 w-full max-w-3xl mr-auto ml-auto pr-6 pb-16 pl-6 relative"
    >
      <h1 class="text-4xl sm:text-5xl font-semibold mb-6">Contact</h1>
      <p class="text-lg text-neutral-700 leading-relaxed mb-4">
        Have questions, feedback, or partnership ideas? We'd love to hear from
        you.
      </p>
      <p class="text-lg text-neutral-700 leading-relaxed mb-4">
        The fastest way to reach us is by email:
        <a
          href="mailto:support@10dan.org"
          class="text-indigo-600 hover:text-indigo-700 underline"
          >support@10dan.org</a
        >.
      </p>
    </main>

    <footer
      class="z-10 bg-transparent w-full border-neutral-200/50 border-t mt-auto pt-10 pr-6 pb-10 pl-6 relative"
    >
      <div class="max-w-5xl mx-auto flex flex-col items-center gap-6">
        <nav
          class="flex flex-col sm:flex-row flex-wrap justify-center gap-x-10 gap-y-4 text-base text-neutral-500 font-medium"
        >
          <a
            href="/tos.html"
            class="hover:text-neutral-900 transition-colors duration-200 text-center"
          >
            Terms of Use
          </a>
          <a
            href="/policy.html"
            class="hover:text-neutral-900 transition-colors duration-200 text-center"
          >
            Privacy Policy
          </a>
          <a
            href="mailto:support@10dan.org"
            class="hover:text-neutral-900 transition-colors duration-200 text-center"
          >
            Contact Support
          </a>
        </nav>
      </div>
    </footer>
  </body>
</html>
